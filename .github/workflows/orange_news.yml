# =============================================================================
# Orange News Daily Pipeline v7 FINAL
# =============================================================================
# Цагийн тохиргоо:
#   UTC 00:15 = Монгол цагаар 08:15
#   Pipeline 30 минут ажиллаж дуусна
#   Эхний пост (Market Watch) 09:00 Монгол цагт шууд нийтлэгдэнэ
#   Бусад постууд 10:00, 11:00, 12:00 ... 17:00
# =============================================================================

name: Orange News Daily Pipeline

on:
  schedule:
    # UTC 22:00 = Монгол цагаар 06:00 (off-peak → GHA queue delay ~15 min)
    - cron: '0 22 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TZ: Asia/Ulaanbaatar
      PYTHONIOENCODING: utf-8
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Mongolia timezone
        run: |
          sudo timedatectl set-timezone Asia/Ulaanbaatar || true
          echo "⏰ Current time: $(date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Mongolian fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic google-genai python-dotenv feedparser httpx certifi python-dateutil yfinance Pillow requests

      # -----------------------------------------------------------------
      # Phase 1: RSS цуглуулах
      # -----------------------------------------------------------------
      - name: Phase 1 - Collect RSS news
        run: |
          echo "📡 RSS collector at $(date '+%H:%M:%S %Z')"
          python3 orange_rss_collector.py

      # -----------------------------------------------------------------
      # Phase 1.5: Market Data татах (Монголбанк + Yahoo Finance)
      # -----------------------------------------------------------------
      - name: Phase 1.5 - Fetch market data
        run: |
          echo "📊 Market data fetcher at $(date '+%H:%M:%S %Z')"
          python3 market_data_fetcher.py || echo "⚠️ Market data failed - translator will use fallback"
        continue-on-error: true

      # -----------------------------------------------------------------
      # Phase 2: Gemini translator (Claude fallback) — Market Watch + орчуулга
      # -----------------------------------------------------------------
      - name: Phase 2 — Gemini translator (Claude fallback)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "🤖 Translator at $(date '+%H:%M:%S %Z')"
          python3 orange_translator.py

      # -----------------------------------------------------------------
      # Phase 2.5: Image generator
      # -----------------------------------------------------------------
      - name: Phase 2.5 - Image generator
        run: |
          echo "🎨 Image generator at $(date '+%H:%M:%S %Z')"
          python3 image_generator.py

      # -----------------------------------------------------------------
      # Phase 3: Facebook poster (LIVE)
      # -----------------------------------------------------------------
      - name: Phase 3 - Facebook poster
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: |
          echo "📘 FB poster at $(date '+%H:%M:%S %Z')"
          python3 fb_poster.py --live
      # ----------------------------------------------------------------
      # Phase 4: Commit translated_posts.json (website-руу feed хийх)
      # ----------------------------------------------------------------
      - name: Phase 4 — Commit translated_posts.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add translated_posts.json
          if git diff --staged --quiet; then
            echo "ℹ️  No changes to translated_posts.json"
          else
            git commit -m "data: update translated_posts.json [skip ci]"
            git push
            echo "✅ translated_posts.json committed and pushed"
          fi


      # -----------------------------------------------------------------
      # Артифакт хадгалах (debugging)
      # -----------------------------------------------------------------
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs-${{ github.run_number }}
          path: |
            top_news.json
            translated_posts.json
            assets/generated/*.png
            pipeline_log.txt
          retention-days: 7
