# =============================================================================
# IG Publisher Hourly — Phase 3A scaffolding
# =============================================================================
# Hourly cron-driven Instagram publisher. Reads translated_posts.json on main,
# determines current MNT hour, picks corresponding post index, publishes to
# @orangenews.official.
#
# PHASE 3A STATUS: scaffolding only. Cron schedule commented out below. Manual
# trigger via workflow_dispatch is functional but defaults to dry-run (flag OFF).
# Phase 3C will uncomment the schedule and flip the default flag.
# =============================================================================

name: IG Publisher Hourly

on:
  workflow_dispatch:
    inputs:
      enable_publishing:
        description: 'Set ENABLE_IG_PUBLISHING=1 (false=runner exits without work)'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'true = log payload only, false = LIVE IG publish (Phase 3B.2 default true — must opt in to live)'
        required: false
        default: true
        type: boolean
      force_idx:
        description: 'Override post index (0-9). Blank = use hour-based logic. Set to a specific index to dispatch that post regardless of current MNT hour.'
        required: false
        default: ''
        type: string

  # PHASE 3C activated 2026-05-13 — hourly cron live.
  schedule:
    # MNT 08:00 (UTC 00:00) — Market Watch (post 0)
    - cron: '0 0 * * *'
    # MNT 09:00–17:00 (UTC 01:00–09:00) — hourly news (posts 1–9)
    - cron: '0 1-9 * * *'

# Serialize runs of this workflow. A delayed cron tick must not race with the
# next on-time tick when both push logs/ig_publish_state.json back to main.
# cancel-in-progress: false → never kill an in-flight run; queue the next one.
concurrency:
  group: ig-publisher
  cancel-in-progress: false

# contents: write is required so the state-file commit-back step (below) can
# push logs/ig_publish_state.json. Scoped to THIS workflow only — no other
# workflow gains write access.
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TZ: Asia/Ulaanbaatar
      PYTHONIOENCODING: utf-8
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Run IG publisher
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ENABLE_IG_PUBLISHING: ${{ inputs.enable_publishing && '1' || '0' }}
          # Kill switch: repo variable IG_PUBLISH_ENABLED must equal "true"
          # for the runner to do any work. Empty/absent/anything-else blocks.
          # Set via Settings → Secrets and variables → Actions → Variables.
          IG_PUBLISH_ENABLED: ${{ vars.IG_PUBLISH_ENABLED }}
          # DRY_RUN gate (Phase 3B.2): 'true' → log payload, skip /media_publish;
          # 'false' → live publish. Runner check is `!= "false"`, so the strings
          # MUST be 'true'/'false' (NOT '1'/'0'). Default true matches the
          # runner's safe-by-default behavior — operator must opt into live by
          # explicitly selecting dry_run=false at workflow_dispatch.
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
          # Optional override (Phase 3B.2 acceleration): when non-empty,
          # ig_runner.py picks this post index instead of the hour-based
          # mapping. Hour-based logic remains the default for cron paths.
          FORCE_IDX: ${{ inputs.force_idx }}
        run: |
          echo "🍊 IG runner at $(date '+%H:%M:%S %Z')"
          python3 ig_runner.py

      # Persist logs/ig_publish_state.json across ephemeral runners.
      # if: always() → captures state even if the runner step failed (partial
      # state is more useful than no state for debugging). Only commits when
      # the file actually changed. [skip ci] prevents recursive workflow runs.
      # set -euo pipefail → a failed rebase halts the step before push,
      # preventing partial pushes when main moved during the run.
      - name: Commit state file back to main
        if: always()
        run: |
          set -euo pipefail
          if [ ! -f logs/ig_publish_state.json ]; then
            echo "No state file produced; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs/ig_publish_state.json
          if git diff --quiet --cached; then
            echo "State file unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "chore(ig): update ig_publish_state.json [skip ci]"
          # Rebase on origin/main in case main moved during this run.
          git pull --rebase origin main
          git push origin HEAD:main

      # Per-run heartbeat to Slack. Fires regardless of runner outcome
      # (if: always()) so operators can confirm "did the cron tick?" even on
      # kill-switch / DRY_RUN / silent-skip exit paths. Reads the per-run
      # summary written by ig_runner.py's finally block (logs/ig_publish_run_status.json).
      # Distinct from ig_runner.py's _slack_alert_if_threshold (≥3 failures/day,
      # action signal) — this step is the heartbeat (visibility signal).
      - name: Notify Slack (per-run)
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_WORKFLOW: ${{ github.workflow }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping notification"
            exit 0
          fi
          STATUS_FILE="logs/ig_publish_run_status.json"
          if [ -f "$STATUS_FILE" ]; then
            EXIT_PATH=$(jq -r '.exit_path // "unknown"' "$STATUS_FILE")
            POST_IDX=$(jq -r '.post_idx // "—"' "$STATUS_FILE")
            EXTERNAL_ID=$(jq -r '.external_id // ""' "$STATUS_FILE")
            ERROR=$(jq -r '.error // ""' "$STATUS_FILE")
            DATE_STR=$(jq -r '.date_str // ""' "$STATUS_FILE")
          else
            EXIT_PATH="no_status_file"
            POST_IDX="—"
            EXTERNAL_ID=""
            ERROR=""
            DATE_STR=""
          fi
          case "$EXIT_PATH" in
            publish_success)         EMOJI="✅"; DETAIL="published idx=$POST_IDX, IG id=$EXTERNAL_ID" ;;
            dry_run)                 EMOJI="🧪"; DETAIL="DRY_RUN: would post idx=$POST_IDX (date=$DATE_STR)" ;;
            kill_switch)             EMOJI="🛑"; DETAIL="kill switch engaged (no work performed)" ;;
            enable_off)              EMOJI="⏸"; DETAIL="ENABLE_IG_PUBLISHING != 1 (dispatch flag off)" ;;
            out_of_window)           EMOJI="⏰"; DETAIL="MNT hour outside posting window" ;;
            already_published_local) EMOJI="↩"; DETAIL="already published locally idx=$POST_IDX (state cache hit)" ;;
            cross_check_duplicate)   EMOJI="🔁"; DETAIL="upstream duplicate idx=$POST_IDX, IG id=$EXTERNAL_ID" ;;
            idx_out_of_range)        EMOJI="📭"; DETAIL="idx out of range (translated_posts.json shorter than expected)" ;;
            input_missing)           EMOJI="❓"; DETAIL="translated_posts.json missing (translator did not run)" ;;
            image_url_unreachable)   EMOJI="🌐"; DETAIL="image URL unreachable idx=$POST_IDX: $ERROR" ;;
            publish_failure)         EMOJI="❌"; DETAIL="publish failed idx=$POST_IDX: $ERROR" ;;
            exception)               EMOJI="💥"; DETAIL="unhandled exception: $ERROR" ;;
            no_status_file)          EMOJI="⚠"; DETAIL="no status file (runner did not start or crashed before init)" ;;
            *)                       EMOJI="ℹ"; DETAIL="exit_path=$EXIT_PATH" ;;
          esac
          # jq builds the multi-line text via string concatenation + embedded
          # \n. Avoids bash multi-line string syntax (which would break the
          # YAML block scalar indentation). UTF-8 / Cyrillic encode safely.
          PAYLOAD=$(jq -n \
            --arg emoji "$EMOJI" \
            --arg wf "$GH_WORKFLOW" \
            --arg detail "$DETAIL" \
            --arg url "$GH_RUN_URL" \
            --arg js "$GH_JOB_STATUS" \
            '{text: ($emoji + " " + $wf + ": " + $detail + "\nRun: " + $url + "\nJob status: " + $js)}')
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL" > /dev/null
          echo "Slack heartbeat sent: $EXIT_PATH"
