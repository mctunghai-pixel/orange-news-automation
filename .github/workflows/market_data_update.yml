# =============================================================================
# Orange News — Market Data Live Update
# =============================================================================
# Бүх 30 минут тутамд market_data.json шинэчилнэ. Frontend (orangenews-website)
# raw.githubusercontent.com-оос файлыг fetch хийж график шууд харуулна.
#
# Cron: '*/30 * * * *' (UTC, бүх 30 минут).
# Free tier budget: ~720 runs/month × ~30s = ~360 min/month (≪ 2000 min limit).
# =============================================================================

name: Market Data Live Update

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# Хоёр run давхцвал шинэ нь хуучныг cancel хийнэ — queue хуримтлагдахгүй.
concurrency:
  group: market-data-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TZ: UTC
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance requests

      - name: Fetch market data
        run: python3 market_data_writer.py

      - name: Commit market_data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market_data.json
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "data: update market_data.json [skip ci]"
            git push
            echo "Pushed market_data.json"
          fi
