# =============================================================================
# Orange News — MSE Data Refresh
# =============================================================================
# Twice-daily refresh of mse_data.json from mse.mn Server Actions.
# Frontend (orangenews-website) fetches raw.githubusercontent.com → renders
# ticker ribbon, top movers, mining trades.
#
# Cron times (UTC): morning batch 02:00/03:00/04:00 (=MNT 10:00/11:00/12:00),
# evening batch 08:00/09:00 (=MNT 16:00/17:00). The extra slots are retries
# against GHA scheduler misses (yesterday: 3h38m drift; today: 02:00 missed
# entirely until manual workflow_dispatch caught it). Each fire is ~30s and
# intra-day price movement makes additional commits useful, not noisy.
# Schedule: weekdays only — MSE doesn't trade on weekends.
# Free tier budget: ~25 runs/week × ~30s ≈ 12 min/month (negligible).
# concurrency:cancel-in-progress prevents overlap if a slow run is still
# going when the next slot fires.
# =============================================================================

name: MSE data refresh

on:
  schedule:
    - cron: '0 2,3,4,8,9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mse-data-refresh
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      TZ: UTC
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Fetch MSE data
        run: python3 mse_data_fetcher.py

      - name: Commit mse_data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mse_data.json
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "data: update mse_data.json [skip ci]"
            git push
            echo "Pushed mse_data.json"
          fi
