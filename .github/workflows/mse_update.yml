# =============================================================================
# Orange News — MSE Data Refresh
# =============================================================================
# Twice-daily refresh of mse_data.json from mse.mn Server Actions.
# Frontend (orangenews-website) fetches raw.githubusercontent.com → renders
# ticker ribbon, top movers, mining trades.
#
# Cron times (UTC): 02:00 (=10:00 MNT, market open), 08:00 (=16:00 MNT, post-close)
# Schedule: weekdays only — MSE doesn't trade on weekends.
# Free tier budget: ~10 runs/week × ~5s = ~1 min/month (negligible).
# =============================================================================

name: MSE data refresh

on:
  schedule:
    - cron: '0 2,8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mse-data-refresh
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      TZ: UTC
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Fetch MSE data
        run: python3 mse_data_fetcher.py

      - name: Commit mse_data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mse_data.json
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "data: update mse_data.json [skip ci]"
            git push
            echo "Pushed mse_data.json"
          fi
